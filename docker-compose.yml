# Docker Compose configuration for local Langfuse Observability stack

services:
  db:
    image: postgres:16-alpine
    container_name: langfuse-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecurepassword
      POSTGRES_DB: langfuse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse-web
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:mysecurepassword@db:5432/langfuse
      - NEXTAUTH_SECRET=my_super_secret_nextauth_key_at_least_32_characters_long
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
      - LANGFUSE_INIT_PROJECT_NAME=DDM501-Enterprise-Support
      - LANGFUSE_ENABLE_SIGN_UP=true

volumes:
  pgdata:
